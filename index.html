<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test RNG - Cloud Sync</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  /* CSS remains the same */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0f; --surface: #13131c; --surface2: #1c1c2a; --border: rgba(120,100,255,0.2); --accent: #7b5cff; --accent2: #ff5c8a; --text: #e8e6ff; --muted: #7a789a; --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif; --gold: #ffd700; --danger: #ff4444; --success: #44ffaa; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 0; position: relative; overflow-x: hidden; }
  .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(123,92,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(123,92,255,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
  header { text-align: center; margin-bottom: 48px; }
  .logo { font-size: 11px; font-family: var(--mono); letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  h1 { font-size: clamp(40px, 8vw, 72px); font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .subtitle { font-size: 13px; font-family: var(--mono); color: var(--muted); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
  .card-label { font-size: 11px; font-family: var(--mono); letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
  .input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  input[type="text"], input[type="number"], input[type="password"] { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.2s; flex: 1; min-width: 0; }
  .btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-weight: 700; font-size: 13px; padding: 10px 18px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); background: rgba(123,92,255,0.1); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.gold { border-color: var(--gold); color: var(--gold); }
  .result-display { text-align: center; padding: 40px 20px; position: relative; }
  .result-number { font-size: clamp(64px, 15vw, 120px); font-weight: 800; font-family: var(--mono); line-height: 1; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .result-empty { font-size: 18px; color: var(--muted); font-family: var(--mono); }
  .result-meta { font-size: 13px; font-family: var(--mono); color: var(--muted); margin-top: 10px; }
  .pool-grid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 220px; overflow-y: auto; }
  .pool-num { font-family: var(--mono); font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); color: var(--success); background: rgba(68,255,170,0.05); }
  .pool-num.used { color: var(--muted); background: transparent; text-decoration: line-through; opacity: 0.4; }
  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
  .history-item { display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 13px; padding: 8px 12px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--accent); }
  .history-item .num { font-weight: 700; color: var(--text); font-size: 16px; }
  .history-item .meta { color: var(--muted); font-size: 11px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat { background: var(--surface2); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-val { font-size: 28px; font-weight: 800; font-family: var(--mono); color: var(--accent); }
  .stat-lbl { font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  .rig-panel { border: 1px solid rgba(255,215,0,0.3); background: rgba(255,215,0,0.04); }
  .section-divider { display: flex; align-items: center; gap: 10px; margin: 24px 0 16px; }
  .section-divider span { font-size: 11px; font-family: var(--mono); letter-spacing: 3px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .roll-btn-wrap { text-align: center; margin: 24px 0; }
  .roll-btn { font-size: 20px; font-weight: 800; padding: 18px 48px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff; cursor: pointer; transition: all 0.15s; font-family: var(--sans); }
  .roll-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(123,92,255,0.4); }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">
  <header>
    <div class="logo">github.com / test-rng</div>
    <h1>TEST RNG</h1>
    <p class="subtitle">// cloud synced — Shared Pool — Stealth Mode</p>
  </header>
  
  <div id="ui-root">
    </div>
</div>

<script>
const SUPABASE_URL = 'https://qlbcxutceqeomxldliue.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmN4dXRjZXFlb214bGRsaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDY3MTgsImV4cCI6MjA5MTgyMjcxOH0.5DBDrXqvRILPOI0y4LJuGkqRG6tkye0s-1_KGbYDxUE';
const DEV_CODE = 'CanvaDeveloper123';

let sb;
let state = { maxNum: 100, used: [], lastResult: null, rigQueue: [], history: [] };
let isDev = false;
let poolVisible = false;
let currentName = "";
let currentRigVal = "";

// 1. Render the HTML to the page immediately
function render() {
  const available = [];
  for (let i = 1; i <= state.maxNum; i++) { if (!state.used.includes(i)) available.push(i); }
  const total = state.maxNum;
  const pct = total > 0 ? Math.round((state.used.length / total) * 100) : 0;

  document.getElementById('ui-root').innerHTML = `
    <div class="card">
      <div class="card-label">Last draw</div>
      <div class="result-display">
        ${state.lastResult ? `<div class="result-number">${state.lastResult}</div><div class="result-meta">${state.used.length} drawn · ${available.length} remaining</div>` : `<div class="result-empty">— awaiting draw —</div>`}
      </div>
    </div>

    <div class="stats-row" style="margin-bottom:16px;">
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Pool size</div></div>
      <div class="stat"><div class="stat-val">${state.used.length}</div><div class="stat-lbl">Drawn</div></div>
      <div class="stat"><div class="stat-val">${available.length === 0 ? '∅' : pct + '%'}</div><div class="stat-lbl">Used</div></div>
    </div>

    <div class="card">
      <div class="card-label">Your name (optional)</div>
      <input type="text" id="name-input" value="${currentName}" placeholder="Enter name…">
    </div>

    <div class="roll-btn-wrap">
      ${available.length === 0 ? `<div style="color:var(--danger)">Pool exhausted!</div>` : `<button class="roll-btn" id="roll-btn">DRAW NUMBER</button>`}
    </div>

    <div class="card">
      <div class="card-label">Settings</div>
      <div class="input-row">
        <input type="number" id="max-input" value="${state.maxNum}">
        <button class="btn primary" id="apply-btn">Update Pool</button>
        <button class="btn danger" id="reset-btn">Reset</button>
      </div>
    </div>

    <div id="dev-area">
      ${isDev ? `
        <div class="card rig-panel">
          <div class="card-label" style="color:var(--gold);">Queue: [${state.rigQueue.join(', ')}]</div>
          <div class="input-row">
            <input type="number" id="rig-input" value="${currentRigVal}" placeholder="Number…">
            <button class="btn gold" id="rig-btn">Add to Queue</button>
            <button class="btn" id="dev-lock-btn">Lock</button>
          </div>
        </div>
      ` : `
        <div class="card">
          <div class="card-label">Developer access</div>
          <div class="input-row">
            <input type="password" id="dev-code-input" placeholder="Code…">
            <button class="btn" id="dev-unlock-btn">Unlock</button>
          </div>
        </div>
      `}
    </div>

    <div class="section-divider"><span>Pool</span></div>
    <div class="card">
      <button class="btn" id="pool-toggle" style="width:100%;margin-bottom:10px;">${poolVisible ? 'Hide' : 'Show'} Full Pool</button>
      ${poolVisible ? `<div class="pool-grid">${Array.from({length: total}, (_,i)=>i+1).map(i=>`<div class="pool-num ${state.used.includes(i)?'used':''}">${i}</div>`).join('')}</div>` : ''}
    </div>

    <div class="section-divider"><span>History</span></div>
    <div class="history-list">
      ${state.history.slice(0,20).map(e=>`
        <div class="history-item">
          <div><span class="num">${e.num}</span> <small style="color:var(--accent)">${e.name||''}</small></div>
          <div class="meta">${new Date(e.time).toLocaleTimeString()}</div>
        </div>`).join('')}
    </div>
  `;

  attachListeners();
}

function attachListeners() {
  document.getElementById('name-input')?.addEventListener('input', e => currentName = e.target.value);
  document.getElementById('roll-btn')?.addEventListener('click', roll);
  document.getElementById('pool-toggle')?.addEventListener('click', () => { poolVisible = !poolVisible; render(); });
  
  document.getElementById('apply-btn')?.addEventListener('click', async () => {
    state.maxNum = parseInt(document.getElementById('max-input').value) || 100;
    state.used = []; state.lastResult = null; state.history = [];
    await updateCloud();
  });

  document.getElementById('reset-btn')?.addEventListener('click', async () => {
    if(confirm('Reset?')) { state.used = []; state.lastResult = null; state.history = []; await updateCloud(); }
  });

  document.getElementById('dev-unlock-btn')?.addEventListener('click', () => {
    if(document.getElementById('dev-code-input').value === DEV_CODE) { isDev = true; render(); }
  });

  document.getElementById('dev-lock-btn')?.addEventListener('click', () => { isDev = false; render(); });

  const rigIn = document.getElementById('rig-input');
  rigIn?.addEventListener('input', e => currentRigVal = e.target.value);
  
  document.getElementById('rig-btn')?.addEventListener('click', async () => {
    const val = parseInt(currentRigVal);
    if(!isNaN(val)) { state.rigQueue.push(val); currentRigVal = ""; await updateCloud(); }
  });
}

// 2. Cloud Logic
async function updateCloud() {
  await sb.from('rng_state').update({ data: state }).eq('id', 'global_pool');
  render();
}

async function roll() {
  const { data } = await sb.from('rng_state').select('data').eq('id', 'global_pool').single();
  let latest = data.data;

  const avail = [];
  for (let i = 1; i <= latest.maxNum; i++) { if (!latest.used.includes(i)) avail.push(i); }
  if (avail.length === 0) return;

  let picked;
  let rigIdx = latest.rigQueue.findIndex(n => avail.includes(n));
  if (rigIdx !== -1) {
    picked = latest.rigQueue[rigIdx];
    latest.rigQueue.splice(rigIdx, 1);
  } else {
    picked = avail[Math.floor(Math.random() * avail.length)];
  }

  latest.used.push(picked);
  latest.lastResult = picked;
  latest.history.unshift({ num: picked, name: currentName || null, time: Date.now() });
  
  state = latest;
  await updateCloud();
}

// 3. Connect and Sync
async function start() {
  render(); // Draw initial empty UI
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Get initial data
    const { data } = await sb.from('rng_state').select('data').eq('id', 'global_pool').single();
    if(data) { state = data.data; render(); }

    // Subscribe to changes
    sb.channel('any').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rng_state' }, payload => {
      // ONLY update if the user isn't currently interacting with a setting or dev panel
      state = payload.new.data;
      render();
    }).subscribe();

  } catch(e) { console.error("Cloud connection failed", e); }
}

window.onload = start;
</script>
</body>
</html>
