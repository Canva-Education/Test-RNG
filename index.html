<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test RNG - Cloud Sync</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  /* CSS remains exactly as you had it */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0f; --surface: #13131c; --surface2: #1c1c2a; --border: rgba(120,100,255,0.2); --accent: #7b5cff; --accent2: #ff5c8a; --text: #e8e6ff; --muted: #7a789a; --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif; --gold: #ffd700; --danger: #ff4444; --success: #44ffaa; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 0; position: relative; overflow-x: hidden; }
  .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(123,92,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(123,92,255,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
  header { text-align: center; margin-bottom: 48px; }
  .logo { font-size: 11px; font-family: var(--mono); letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  h1 { font-size: clamp(40px, 8vw, 72px); font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .subtitle { font-size: 13px; font-family: var(--mono); color: var(--muted); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
  .card-label { font-size: 11px; font-family: var(--mono); letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
  .input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  input[type="text"], input[type="number"], input[type="password"] { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.2s; flex: 1; min-width: 0; }
  .btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-weight: 700; font-size: 13px; padding: 10px 18px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); background: rgba(123,92,255,0.1); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.gold { border-color: var(--gold); color: var(--gold); }
  .result-display { text-align: center; padding: 40px 20px; position: relative; }
  .result-number { font-size: clamp(64px, 15vw, 120px); font-weight: 800; font-family: var(--mono); line-height: 1; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .result-empty { font-size: 18px; color: var(--muted); font-family: var(--mono); }
  .result-meta { font-size: 13px; font-family: var(--mono); color: var(--muted); margin-top: 10px; }
  .pool-grid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 220px; overflow-y: auto; }
  .pool-num { font-family: var(--mono); font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); color: var(--success); background: rgba(68,255,170,0.05); }
  .pool-num.used { color: var(--muted); background: transparent; text-decoration: line-through; opacity: 0.4; }
  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
  .history-item { display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 13px; padding: 8px 12px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--accent); }
  .history-item .num { font-weight: 700; color: var(--text); font-size: 16px; }
  .history-item .meta { color: var(--muted); font-size: 11px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat { background: var(--surface2); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-val { font-size: 28px; font-weight: 800; font-family: var(--mono); color: var(--accent); }
  .stat-lbl { font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  .rig-panel { border: 1px solid rgba(255,215,0,0.3); background: rgba(255,215,0,0.04); }
  .section-divider { display: flex; align-items: center; gap: 10px; margin: 24px 0 16px; }
  .section-divider span { font-size: 11px; font-family: var(--mono); letter-spacing: 3px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .roll-btn-wrap { text-align: center; margin: 24px 0; }
  .roll-btn { font-size: 20px; font-weight: 800; padding: 18px 48px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff; cursor: pointer; transition: all 0.15s; font-family: var(--sans); }
  .roll-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(123,92,255,0.4); }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .msg.info { background: rgba(123,92,255,0.08); color: #a08fff; border: 1px solid rgba(123,92,255,0.2); padding: 8px; border-radius: 6px; font-size: 12px; font-family: var(--mono); margin-top: 10px; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">
  <header>
    <div class="logo">github.com / test-rng</div>
    <h1>TEST RNG</h1>
    <p class="subtitle">// cloud synced — Shared Pool — Stealth Mode</p>
  </header>
  
  <div class="card" id="result-card">
    <div class="card-label">Last draw</div>
    <div id="result-inner" class="result-display"><div class="result-empty">— Connecting —</div></div>
  </div>

  <div id="stats-inner" class="stats-row" style="margin-bottom:16px;"></div>
